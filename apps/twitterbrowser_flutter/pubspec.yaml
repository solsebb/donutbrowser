name: twitterbrowser_flutter
description: "TwitterBrowser companion app with an IntentBot-derived shell."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  figma_squircle: ^0.6.3
  flutter_dotenv: ^5.1.0
  flutter_riverpod: ^2.4.9
  flutter_shared_core:
    path: ../../packages/flutter_shared_core
  flutter_svg: ^2.0.10+1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  http: ^1.2.0
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  supabase_flutter: ^2.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.example
    - assets/images/
    - assets/images/testimonials/
    - assets/icons/
    - assets/icons/country_flags_svg_icons/
    - assets/logos/
    - assets/logos/socials_logo_icons/
    - assets/logos/meeting_integrations/
    - assets/logos/integration_platforms/
    - assets/logos/seo_metrics_icons/
    - assets/logos/llms/
    - assets/brands/
    - assets/brands/intentbot/
    - assets/brands/twitterbrowser/
    - assets/animations/
    - assets/sounds/
    - assets/fonts/
    - assets/fonts/Inter/static/
    - assets/fonts/Lyon-Text/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/static/Inter_18pt-Regular.ttf
        - asset: assets/fonts/Inter/static/Inter_18pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter/static/Inter_18pt-Italic.ttf
          style: italic
        - asset: assets/fonts/Inter/static/Inter_18pt-BoldItalic.ttf
          weight: 700
          style: italic
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800
    - family: LyonText
      fonts:
        - asset: assets/fonts/Lyon-Text/LyonTextWeb-RegularNoTwo.woff2
          weight: 400
        - asset: assets/fonts/Lyon-Text/LyonTextWeb-RegularNoTwoItalic.woff2
          weight: 400
          style: italic
        - asset: assets/fonts/Lyon-Text/LyonTextWeb-Semibold.woff2
          weight: 600
        - asset: assets/fonts/Lyon-Text/LyonTextWeb-SemiboldItalic.woff2
          weight: 600
          style: italic
        - asset: assets/fonts/Lyon-Text/LyonTextWeb-Bold.woff2
          weight: 700
        - asset: assets/fonts/Lyon-Text/LyonTextWeb-BoldItalic.woff2
          weight: 700
          style: italic
