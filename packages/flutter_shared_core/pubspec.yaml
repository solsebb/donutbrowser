name: flutter_shared_core
description: Shared infrastructure for RankPeak and Liink - UI components, auth, subscription, theme
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI Framework
  figma_squircle: ^0.6.3
  cupertino_icons: ^1.0.2

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Backend
  supabase_flutter: ^2.0.0
  flutter_dotenv: ^5.1.0
  equatable: ^2.0.5

  # Authentication
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^5.0.0
  crypto: ^3.0.6
  signin_with_linkedin: ^2.0.1
  flutter_web_auth_2: ^4.1.0

  # UI Components
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  vector_graphics: ^1.1.0
  shimmer: ^3.0.0
  flutter_skeleton_ui: ^0.0.6
  cached_network_image: ^3.4.0
  modal_bottom_sheet: ^3.0.0
  auto_size_text: ^3.0.0
  loading_animation_widget: ^1.3.0
  lottie: ^3.1.3
  flutter_confetti: ^0.5.1
  flutter_colorpicker: ^1.1.0

  # Payments & Subscription
  purchases_flutter: ^8.10.1
  purchases_ui_flutter: ^8.10.1
  flutter_stripe: ^11.2.0
  flutter_stripe_web: ^6.1.0
  in_app_purchase: ^3.2.1
  in_app_purchase_storekit: ^0.3.7
  in_app_purchase_android: ^0.4.0+1

  # Firebase
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  firebase_messaging: ^15.1.3

  # Navigation & Deep Linking
  go_router: ^14.8.1
  app_links: ^6.4.0
  url_launcher: ^6.3.1

  # Utils
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  intl: ^0.20.2
  logger: ^2.1.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.5
  flutter_cache_manager: ^3.4.1
  permission_handler: ^11.3.1
  device_info_plus: ^11.4.0
  flutter_secure_storage: ^9.2.4
  package_info_plus: ^8.3.0
  uuid: ^4.5.1
  http: ^1.2.0
  share_plus: ^7.2.1
  timeago: ^3.6.0
  url_strategy: ^0.3.0
  web_socket_channel: ^2.4.0

  # QR Codes (useful for both products)
  qr_flutter: ^4.1.0

  # In-App Review
  in_app_review: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

dependency_overrides:
  figma_squircle: ^0.6.3
